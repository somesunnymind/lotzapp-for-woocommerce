name: Build Plugin Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build WordPress plugin ZIP
        run: |
          mkdir -p build/lotzapp-for-woocommerce
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            ./ build/lotzapp-for-woocommerce/
          cd build
          zip -r lotzapp-for-woocommerce.zip lotzapp-for-woocommerce

      - name: Attach ZIP to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/lotzapp-for-woocommerce.zip
